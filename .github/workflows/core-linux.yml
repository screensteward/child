name: core-linux

on:
  push:
    branches: [ main, phase1 ]
    paths:
      - 'core-linux/**'
      - '.github/workflows/core-linux.yml'
  pull_request:
    paths:
      - 'core-linux/**'
      - '.github/workflows/core-linux.yml'

jobs:
  fmt-clippy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core-linux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-linux -> core-linux/target
      - name: apt deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-24.04
    needs: fmt-clippy
    defaults:
      run:
        working-directory: core-linux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-linux -> core-linux/target
      - name: apt deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: install nextest
        run: cargo install --locked cargo-nextest
      - name: unit + integration tests (skip #[ignore])
        run: cargo nextest run --workspace

  test-root:
    # Exercises the #[ignore]'d tests that need real cgroups v2 / namespaces.
    # No such tests exist yet (Phase 1 core uses a mock cgroup backend), but
    # the infra is wired now so they light up automatically when we add
    # them. `ignored-only` makes the job a no-op until then.
    runs-on: ubuntu-24.04
    needs: test
    container:
      image: ubuntu:24.04
      options: --privileged
    defaults:
      run:
        working-directory: core-linux
    steps:
      - uses: actions/checkout@v4
      - name: apt deps
        run: |
          apt-get update
          apt-get install -y curl build-essential libdbus-1-dev pkg-config ca-certificates
      - name: install rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.93 --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: install nextest
        run: cargo install --locked cargo-nextest
      - name: test root (cgroups v2 réels, #[ignore])
        run: cargo nextest run --workspace --run-ignored ignored-only

  build:
    runs-on: ubuntu-24.04
    needs: fmt-clippy
    defaults:
      run:
        working-directory: core-linux
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-linux -> core-linux/target
      - name: apt deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: release build
        run: cargo build --workspace --release
